<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- iOS não expõe Fullscreen API pra elemento genérico em nenhuma versão — o único jeito
         real de esconder a barra de URL/favoritos é abrir por um ícone adicionado à Tela de
         Início (immersion.ts detecta isso e orienta o jogador em vez de tentar e falhar). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AttackOnPlayer" />
    <title>AttackOnPlayer — M0.5</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #111; }
      /* T-048 (SPEC-0012): imersão de navegador — o jogo inteiro (fora do overlay de debug)
         não deixa o navegador roubar o gesto: sem seleção de texto, sem pinch-zoom/pull-to-refresh. */
      html, body {
        touch-action: none; overscroll-behavior: none;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #debug-overlay, #debug-overlay * { user-select: text; }
      /* Perfil mouse (ADR-015/T-019): oculta o cursor do SO — o crosshair abaixo o substitui */
      body.cursor-hidden, body.cursor-hidden canvas { cursor: none; }
      #crosshair {
        position: fixed; top: 0; left: 0; width: 22px; height: 22px; z-index: 15;
        pointer-events: none; display: none; transform: translate(-50%, -50%);
      }
      #crosshair.active { display: block; }
      #crosshair::before, #crosshair::after {
        content: ""; position: absolute; background: #e0e0e0;
        box-shadow: 0 0 2px #000, 0 0 2px #000;
      }
      #crosshair::before { left: 50%; top: 2px; bottom: 2px; width: 2px; transform: translateX(-50%); }
      #crosshair::after { top: 50%; left: 2px; right: 2px; height: 2px; transform: translateY(-50%); }
      /* Perfil touch (ADR-015/T-019b): twin-stick virtual — some quando o perfil não é touch */
      body.touch-profile { touch-action: none; -webkit-user-select: none; user-select: none; }
      .touch-stick-base {
        /* env(safe-area-inset-*) (viewport-fit=cover): em paisagem no iPhone o notch/home
           indicator ficam nas laterais/embaixo — sem isso os analógicos ficam por baixo do
           recorte da tela. 0px fora do iOS (a env() só existe lá). */
        position: fixed; bottom: calc(28px + env(safe-area-inset-bottom, 0px));
        width: 110px; height: 110px; border-radius: 50%;
        background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.25);
        z-index: 16; display: none;
      }
      body.touch-profile .touch-stick-base { display: block; }
      #touch-move-base { left: calc(28px + env(safe-area-inset-left, 0px)); }
      #touch-aim-base { right: calc(28px + env(safe-area-inset-right, 0px)); }
      .touch-stick-knob {
        position: absolute; left: 50%; top: 50%; width: 52px; height: 52px;
        margin: -26px 0 0 -26px; border-radius: 50%; background: rgba(255,255,255,.35);
        pointer-events: none;
      }
      /* Seletor de perfil (ADR-015): auto-detecção decide o padrão; isto é a troca manual */
      #profile-selector {
        position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 17;
        display: flex; gap: 4px; background: rgba(12,12,16,.6); border-radius: 8px; padding: 4px;
      }
      #profile-selector button {
        font-size: 16px; line-height: 1; padding: 5px 9px; border-radius: 6px;
        border: 1px solid transparent; background: transparent; color: #ccc; cursor: pointer;
      }
      #profile-selector button.active { background: rgba(255,213,79,.18); border-color: #ffd54f66; color: #ffd54f; }
      /* T-048 (SPEC-0012): tela cheia — separado por uma divisória sutil dos perfis de controle. */
      #fullscreen-toggle { margin-left: 4px; padding-left: 10px; border-left: 1px solid rgba(255,255,255,.15); }
      #fullscreen-toggle.active { background: rgba(255,213,79,.18); border-color: #ffd54f66; color: #ffd54f; }
      /* HUD gamificado (passe visual): badge de nível + barras HP/XP + chips de efeito.
         Regra mantida: só exibe estado — a UI é a "camada de leitura", nada é calculado. */
      #hud.hud-panel {
        position: fixed; top: 10px; left: 10px; z-index: 10;
        font-family: "Segoe UI", system-ui, sans-serif; color: #eaeaea;
        background: linear-gradient(160deg, rgba(20,22,32,.86), rgba(12,13,20,.86));
        border: 1px solid rgba(255,255,255,.08); border-radius: 12px;
        padding: 9px 12px 8px; width: 244px;
        box-shadow: 0 4px 18px rgba(0,0,0,.45); pointer-events: none;
        backdrop-filter: blur(3px);
      }
      #hud .hud-top { display: flex; align-items: center; gap: 10px; }
      #hud .hud-badge {
        flex: none; width: 40px; height: 40px; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #ffe082, #ffab00);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 10px rgba(255,171,0,.5), inset 0 0 4px rgba(0,0,0,.3);
        border: 2px solid #fff3; }
      #hud .hud-badge-lv { font-weight: 800; font-size: 19px; color: #241a00; text-shadow: 0 1px 0 #fff6; }
      #hud .hud-bars { flex: 1; display: flex; flex-direction: column; gap: 5px; }
      #hud .hud-bar {
        position: relative; height: 15px; border-radius: 8px; overflow: hidden;
        background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.08); }
      #hud .hud-bar-fill { height: 100%; width: 0%; border-radius: 8px; transition: width .18s ease, background .3s ease; }
      #hud .hud-bar.xp .hud-bar-fill { background: linear-gradient(90deg, #4fc3f7, #29b6f6); }
      #hud .hud-bar-label {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-weight: 700; color: #fff; letter-spacing: .3px;
        text-shadow: 0 1px 2px #000, 0 0 2px #000; }
      #hud .hud-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
      #hud .hud-chips:empty { display: none; }
      #hud .chip {
        font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px;
        background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.14); color: #fff; }
      #hud .chip.speed { background: rgba(38,198,218,.22); border-color: #26c6da88; color: #7be7f5; }
      #hud .chip.xp { background: rgba(255,213,79,.2); border-color: #ffd54f88; color: #ffe082; }
      #hud .chip.shield { background: rgba(66,165,245,.22); border-color: #42a5f588; color: #90caf9; }
      #hud .chip.flag { background: rgba(255,171,0,.22); border-color: #ffab0088; color: #ffcc66; }
      #hud .chip.queue { background: rgba(126,231,170,.18); border-color: #7fffaa66; color: #9affc4; }
      #hud .chip.weapon { background: rgba(255,109,0,.22); border-color: #ff6d0088; color: #ffb27a; }
      #hud .hud-details { display: flex; flex-wrap: wrap; gap: 4px 9px; margin-top: 7px;
        font-size: 11px; color: #b8c0cc; font-family: monospace; }
      #hud .hud-details:empty { display: none; }
      #hud .hud-details .skills { color: #ffd54f; width: 100%; }
      #hud .hud-details .hint { color: #6b7280; width: 100%; }
      #hud .hud-ping { position: absolute; top: 8px; right: 11px; font-size: 10px; color: #6b7280; font-family: monospace; }
      /* Estado inicial (antes da 1ª atualização, ainda como texto "conectando...") */
      #hud:not(.hud-panel) {
        position: fixed; top: 10px; left: 10px; z-index: 10;
        font-family: monospace; font-size: 13px; color: #8a8; }
      /* Lista de players — design neutro em desenvolvimento (SPEC-0002) */
      #roster {
        position: fixed; top: 8px; right: 8px; z-index: 10;
        min-width: 170px; max-height: 45vh; overflow: hidden;
        font-family: monospace; font-size: 12px; color: #ccc;
        background: rgba(12,12,16,.7); border: 1px solid #333;
        border-radius: 8px; padding: 6px 0; pointer-events: none;
      }
      #roster .title {
        padding: 2px 10px 6px; color: #888; letter-spacing: 2px;
        border-bottom: 1px solid #2a2a2a; margin-bottom: 4px;
      }
      #roster .row { display: flex; align-items: center; gap: 6px; padding: 2px 10px; }
      #roster .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
      #roster .dot.self { background: #42a5f5; }
      #roster .dot.enemy { background: #ef5350; }
      #roster .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #roster .tag { color: #777; font-size: 10px; }
      #roster .lvl { color: #ffd54f; }
      #roster .roster-count { padding: 2px 10px; font-size: 13px; color: #ffd54f; white-space: nowrap; }
      /* Mobile (heurística de dispositivo touch, ADR-015 — aplicada em immersion.ts): painéis
         compactos pra não tomar a tela pequena nem disputar espaço com os manches touch.
         Roster mostra só a contagem de players (hud.ts) — nunca a lista completa. */
      body.mobile-layout #hud.hud-panel { width: 168px; padding: 7px 9px 6px; border-radius: 9px; }
      body.mobile-layout #hud .hud-badge { width: 30px; height: 30px; }
      body.mobile-layout #hud .hud-badge-lv { font-size: 15px; }
      body.mobile-layout #hud .hud-bar { height: 12px; }
      body.mobile-layout #hud .hud-details .hint { display: none; }
      body.mobile-layout #roster { min-width: 0; padding: 3px 0; }
      body.mobile-layout #auth-widget { bottom: 172px; font-size: 10px; }
      /* Overlay de Debug (T-007) */
      #debug-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        display: none; z-index: 50; flex-direction: column;
        pointer-events: none;
      }
      #debug-overlay.active { display: flex; }
      #debug-state {
        flex: 1; overflow: auto;
        background: rgba(0,0,5,0.82); color: #0fa;
        font-family: monospace; font-size: 12px;
        padding: 10px 14px; margin: 8px 8px 0;
        border-radius: 6px; border: 1px solid #0a5;
        white-space: pre; pointer-events: auto;
        max-height: 55vh;
      }
      #debug-state h3 { margin: 0 0 6px; color: #7fffaa; font-size: 13px; }
      #debug-state table { border-collapse: collapse; width: 100%; }
      #debug-state td { padding: 1px 8px 1px 0; vertical-align: top; }
      #debug-state td:first-child { color: #888; min-width: 120px; }
      #debug-state .section { color: #0fa; font-weight: bold; margin-top: 8px; }
      #debug-close {
        pointer-events: auto; position: absolute; top: 14px; right: 14px;
        background: #0a5; border: none; color: #000; font-weight: bold;
        font-family: monospace; padding: 2px 10px; border-radius: 3px;
        cursor: pointer; z-index: 51; font-size: 13px;
      }
      #debug-events {
        max-height: 180px; overflow-y: auto;
        background: rgba(0,0,0,0.75); color: #0fa;
        font-family: monospace; font-size: 11px;
        padding: 4px; margin: 4px 8px 8px;
        border-radius: 4px; border: 1px solid #0a5;
        pointer-events: auto;
      }
      .debug-event { padding: 1px 2px; line-height: 1.4; }
      .debug-event .ts { color: #555; margin-right: 8px; }
      .debug-event.type-death { color: #ff6b6b; }
      .debug-event.type-hit { color: #ffd700; }
      .debug-event.type-pickup { color: #7fffaa; }
      .debug-event.type-spawn { color: #87ceeb; }
      .debug-event.type-respawn { color: #7aa7ff; }
      .debug-event.type-safe_block { color: #66d9ff; }
      .debug-f3-hint {
        color: #555; font-family: monospace; font-size: 11px;
        position: fixed; bottom: 6px; left: 8px; z-index: 11;
        pointer-events: none;
      }
      /* Cards de level-up (T-016) — placeholder de UI, fase visual F1 */
      #upgrade-cards {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
        z-index: 20; display: none; flex-direction: column; align-items: center;
        font-family: monospace; pointer-events: none;
      }
      #upgrade-cards.active { display: flex; }
      #upgrade-cards .upgrade-header {
        color: #ffd54f; font-size: 12px; letter-spacing: 2px; margin-bottom: 6px;
        text-shadow: 0 0 6px #000;
      }
      #upgrade-cards .upgrade-row { display: flex; gap: 10px; }
      .upgrade-card {
        pointer-events: auto; cursor: pointer; min-width: 130px;
        background: rgba(16,16,24,.92); color: #eee;
        border: 1px solid #ffd54f66; border-radius: 8px; padding: 10px 12px;
        font-family: monospace; font-size: 12px; text-align: center;
        display: flex; flex-direction: column; gap: 6px; align-items: center;
      }
      .upgrade-card:hover { border-color: #ffd54f; background: rgba(30,30,44,.95); }
      .upgrade-card .key {
        background: #ffd54f; color: #000; font-weight: bold;
        border-radius: 4px; padding: 0 6px; font-size: 11px;
      }
      #upgrade-cards .upgrade-timer {
        width: 220px; height: 3px; background: #333; border-radius: 2px; margin-top: 8px;
      }
      #upgrade-cards .upgrade-timer-fill { height: 100%; background: #ffd54f; border-radius: 2px; }
      /* Toasts (T-023): substitui os textos crus do HUD (streak, card, farm_event) — fila
         no canto, nunca no centro da tela; nunca bloqueia clique (pointer-events: none). */
      #toast-stack {
        position: fixed; bottom: 24px; right: 12px; z-index: 25;
        display: flex; flex-direction: column-reverse; gap: 6px;
        max-width: 260px; pointer-events: none;
      }
      .toast {
        background: rgba(20,20,28,.88); color: #fff; font-family: monospace; font-size: 12px;
        padding: 6px 10px; border-radius: 6px; border: 1px solid #ffd54f55;
        opacity: 0; transform: translateX(18px);
        transition: opacity .25s ease, transform .25s ease;
      }
      .toast.show { opacity: 1; transform: translateX(0); }
      /* T-028c (SPEC-0008): janela discreta de conta — nunca modal, nunca sobre a área de
         jogo; fica encolhida no canto até o jogador clicar. Guest (padrão) continua 1 clique. */
      #auth-widget {
        position: fixed; bottom: 150px; left: 10px; z-index: 22;
        font-family: monospace; font-size: 11px; color: #ccc;
      }
      #auth-pill {
        display: flex; align-items: center; gap: 6px;
        background: rgba(12,12,16,.7); border: 1px solid #333; border-radius: 999px;
        padding: 4px 10px; cursor: pointer; user-select: none;
      }
      #auth-pill:hover { border-color: #ffd54f66; }
      #auth-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: #7a7a7a; flex: none; }
      #auth-pill.logged-in .dot { background: #7fffaa; }
      #auth-pill .name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #auth-logout {
        pointer-events: auto; background: none; border: none; color: #ff8a80;
        font-family: monospace; font-size: 11px; cursor: pointer; padding: 0; margin-left: 2px;
      }
      #auth-panel {
        display: none; margin-bottom: 6px; width: 190px;
        background: rgba(16,16,24,.94); border: 1px solid #ffd54f44; border-radius: 8px;
        padding: 10px; flex-direction: column; gap: 6px;
      }
      #auth-panel.open { display: flex; }
      #auth-widget.open #auth-pill { display: none; }
      .auth-tabs { display: flex; gap: 4px; margin-bottom: 2px; }
      .auth-tabs button {
        flex: 1; background: transparent; border: 1px solid transparent; color: #999;
        font-family: monospace; font-size: 11px; padding: 3px 0; border-radius: 4px; cursor: pointer;
      }
      .auth-tabs button.active { background: rgba(255,213,79,.14); border-color: #ffd54f55; color: #ffd54f; }
      #auth-form { display: flex; flex-direction: column; gap: 5px; }
      #auth-form input {
        background: rgba(0,0,0,.35); border: 1px solid #444; border-radius: 4px;
        color: #eee; font-family: monospace; font-size: 11px; padding: 4px 6px;
      }
      #auth-form input:focus { outline: none; border-color: #ffd54f88; }
      .auth-form-row { display: flex; gap: 5px; }
      #auth-submit {
        flex: 1; background: #ffd54f; border: none; border-radius: 4px; color: #241a00;
        font-weight: bold; font-family: monospace; font-size: 11px; padding: 4px 0; cursor: pointer;
      }
      #auth-cancel {
        background: transparent; border: 1px solid #444; border-radius: 4px; color: #999;
        font-family: monospace; font-size: 11px; padding: 4px 8px; cursor: pointer;
      }
      #auth-error { color: #ff8a80; font-size: 10px; min-height: 12px; }
    </style>
  </head>
  <body>
    <div id="crosshair"></div>
    <div id="profile-selector">
      <button data-profile="mouse" title="Mouse">🖱️</button>
      <button data-profile="keyboard" title="Teclado">⌨️</button>
      <button data-profile="touch" title="Touch">📱</button>
      <button id="fullscreen-toggle" title="Tela cheia">⛶</button>
    </div>
    <div id="touch-move-base" class="touch-stick-base"><div id="touch-move-knob" class="touch-stick-knob"></div></div>
    <div id="touch-aim-base" class="touch-stick-base"><div id="touch-aim-knob" class="touch-stick-knob"></div></div>
    <div id="hud">conectando...</div>
    <div id="roster"></div>
    <div id="auth-widget">
      <div id="auth-panel">
        <div class="auth-tabs">
          <button type="button" id="auth-tab-login" class="active">Entrar</button>
          <button type="button" id="auth-tab-register">Registrar</button>
        </div>
        <form id="auth-form">
          <input id="auth-email" type="email" placeholder="email" autocomplete="email" required />
          <input id="auth-password" type="password" placeholder="senha" autocomplete="current-password" required />
          <input id="auth-display-name" type="text" placeholder="nome (opcional)" maxlength="32" style="display:none" />
          <div id="auth-error"></div>
          <div class="auth-form-row">
            <button type="submit" id="auth-submit">Entrar</button>
            <button type="button" id="auth-cancel">✕</button>
          </div>
        </form>
      </div>
      <div id="auth-pill">
        <span class="dot"></span>
        <span class="name" id="auth-pill-label">guest</span>
        <button id="auth-logout" style="display:none" title="Sair">sair</button>
      </div>
    </div>
    <div id="upgrade-cards"></div>
    <div id="toast-stack"></div>
    <div id="debug-overlay">
      <button id="debug-close">✕ F3</button>
      <div id="debug-state"></div>
      <div id="debug-events"></div>
    </div>
    <div class="debug-f3-hint">[F3] debug</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
