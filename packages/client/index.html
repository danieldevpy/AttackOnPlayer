<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>AttackOnPlayer — M0.5</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #111; }
      /* Perfil mouse (ADR-015/T-019): oculta o cursor do SO — o crosshair abaixo o substitui */
      body.cursor-hidden, body.cursor-hidden canvas { cursor: none; }
      #crosshair {
        position: fixed; top: 0; left: 0; width: 22px; height: 22px; z-index: 15;
        pointer-events: none; display: none; transform: translate(-50%, -50%);
      }
      #crosshair.active { display: block; }
      #crosshair::before, #crosshair::after {
        content: ""; position: absolute; background: #e0e0e0;
        box-shadow: 0 0 2px #000, 0 0 2px #000;
      }
      #crosshair::before { left: 50%; top: 2px; bottom: 2px; width: 2px; transform: translateX(-50%); }
      #crosshair::after { top: 50%; left: 2px; right: 2px; height: 2px; transform: translateY(-50%); }
      #hud {
        position: fixed; top: 8px; left: 8px; z-index: 10;
        font-family: monospace; font-size: 14px; color: #0f0;
        background: rgba(0,0,0,.55); padding: 8px 10px; border-radius: 6px;
        pointer-events: none; white-space: pre;
      }
      /* Lista de players — design neutro em desenvolvimento (SPEC-0002) */
      #roster {
        position: fixed; top: 8px; right: 8px; z-index: 10;
        min-width: 170px; max-height: 45vh; overflow: hidden;
        font-family: monospace; font-size: 12px; color: #ccc;
        background: rgba(12,12,16,.7); border: 1px solid #333;
        border-radius: 8px; padding: 6px 0; pointer-events: none;
      }
      #roster .title {
        padding: 2px 10px 6px; color: #888; letter-spacing: 2px;
        border-bottom: 1px solid #2a2a2a; margin-bottom: 4px;
      }
      #roster .row { display: flex; align-items: center; gap: 6px; padding: 2px 10px; }
      #roster .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
      #roster .dot.self { background: #42a5f5; }
      #roster .dot.enemy { background: #ef5350; }
      #roster .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #roster .tag { color: #777; font-size: 10px; }
      #roster .lvl { color: #ffd54f; }
      /* Overlay de Debug (T-007) */
      #debug-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        display: none; z-index: 50; flex-direction: column;
        pointer-events: none;
      }
      #debug-overlay.active { display: flex; }
      #debug-state {
        flex: 1; overflow: auto;
        background: rgba(0,0,5,0.82); color: #0fa;
        font-family: monospace; font-size: 12px;
        padding: 10px 14px; margin: 8px 8px 0;
        border-radius: 6px; border: 1px solid #0a5;
        white-space: pre; pointer-events: auto;
        max-height: 55vh;
      }
      #debug-state h3 { margin: 0 0 6px; color: #7fffaa; font-size: 13px; }
      #debug-state table { border-collapse: collapse; width: 100%; }
      #debug-state td { padding: 1px 8px 1px 0; vertical-align: top; }
      #debug-state td:first-child { color: #888; min-width: 120px; }
      #debug-state .section { color: #0fa; font-weight: bold; margin-top: 8px; }
      #debug-close {
        pointer-events: auto; position: absolute; top: 14px; right: 14px;
        background: #0a5; border: none; color: #000; font-weight: bold;
        font-family: monospace; padding: 2px 10px; border-radius: 3px;
        cursor: pointer; z-index: 51; font-size: 13px;
      }
      #debug-events {
        max-height: 180px; overflow-y: auto;
        background: rgba(0,0,0,0.75); color: #0fa;
        font-family: monospace; font-size: 11px;
        padding: 4px; margin: 4px 8px 8px;
        border-radius: 4px; border: 1px solid #0a5;
        pointer-events: auto;
      }
      .debug-event { padding: 1px 2px; line-height: 1.4; }
      .debug-event .ts { color: #555; margin-right: 8px; }
      .debug-event.type-death { color: #ff6b6b; }
      .debug-event.type-hit { color: #ffd700; }
      .debug-event.type-pickup { color: #7fffaa; }
      .debug-event.type-spawn { color: #87ceeb; }
      .debug-event.type-respawn { color: #7aa7ff; }
      .debug-event.type-safe_block { color: #66d9ff; }
      .debug-f3-hint {
        color: #555; font-family: monospace; font-size: 11px;
        position: fixed; bottom: 6px; left: 8px; z-index: 11;
        pointer-events: none;
      }
      /* Cards de level-up (T-016) — placeholder de UI, fase visual F1 */
      #upgrade-cards {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
        z-index: 20; display: none; flex-direction: column; align-items: center;
        font-family: monospace; pointer-events: none;
      }
      #upgrade-cards.active { display: flex; }
      #upgrade-cards .upgrade-header {
        color: #ffd54f; font-size: 12px; letter-spacing: 2px; margin-bottom: 6px;
        text-shadow: 0 0 6px #000;
      }
      #upgrade-cards .upgrade-row { display: flex; gap: 10px; }
      .upgrade-card {
        pointer-events: auto; cursor: pointer; min-width: 130px;
        background: rgba(16,16,24,.92); color: #eee;
        border: 1px solid #ffd54f66; border-radius: 8px; padding: 10px 12px;
        font-family: monospace; font-size: 12px; text-align: center;
        display: flex; flex-direction: column; gap: 6px; align-items: center;
      }
      .upgrade-card:hover { border-color: #ffd54f; background: rgba(30,30,44,.95); }
      .upgrade-card .key {
        background: #ffd54f; color: #000; font-weight: bold;
        border-radius: 4px; padding: 0 6px; font-size: 11px;
      }
      #upgrade-cards .upgrade-timer {
        width: 220px; height: 3px; background: #333; border-radius: 2px; margin-top: 8px;
      }
      #upgrade-cards .upgrade-timer-fill { height: 100%; background: #ffd54f; border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="crosshair"></div>
    <div id="hud">conectando...</div>
    <div id="roster"></div>
    <div id="upgrade-cards"></div>
    <div id="debug-overlay">
      <button id="debug-close">✕ F3</button>
      <div id="debug-state"></div>
      <div id="debug-events"></div>
    </div>
    <div class="debug-f3-hint">[F3] debug</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
